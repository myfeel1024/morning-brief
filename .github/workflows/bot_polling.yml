name: 퀀트 신호 분석

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram chat ID (Render 봇이 전달)'
        required: true
      top_n:
        description: '분석 종목 수'
        required: false
        default: '10'

jobs:
  run-quant:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install yfinance requests anthropic pykrx numpy pandas

      - name: 퀀트 분석 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          QUANT_CHAT_ID:      ${{ github.event.inputs.chat_id }}
          QUANT_TOP_N:        ${{ github.event.inputs.top_n }}
        run: python actions_bot.py

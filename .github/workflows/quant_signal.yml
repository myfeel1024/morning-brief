name: 퀀트 신호 브리핑

on:
  schedule:
    - cron: '30 23 * * 0-4'   # 월~금 23:30 UTC = 화~토 08:30 KST
  workflow_dispatch:            # 수동 테스트용

jobs:
  send-quant-signal:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance requests anthropic pykrx numpy pandas

      - name: 퀀트 신호 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python quant_runner.py 10
